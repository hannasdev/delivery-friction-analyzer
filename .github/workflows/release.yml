name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'Release ') }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy key
        env:
          RELEASE_DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          if [ -z "$RELEASE_DEPLOY_KEY" ]; then
            echo "RELEASE_DEPLOY_KEY is required for release commits and tags." >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate package version is not behind latest tag
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -n "$LATEST_TAG" ]; then
            node scripts/release-versioning.mjs assert-not-behind "$PACKAGE_VERSION" "${LATEST_TAG#v}"
          fi

      - name: Determine version increment
        id: increment
        run: |
          LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -n "$LATEST_TAG" ]; then
            COMMIT_RANGE="${LATEST_TAG}..HEAD"
          else
            COMMIT_RANGE="HEAD"
          fi
          git log --format=%s%n%b "$COMMIT_RANGE" | node scripts/release-versioning.mjs increment > increment.txt
          echo "increment=$(cat increment.txt)" >> "$GITHUB_OUTPUT"

      - run: npm test

      - name: Bump package version
        id: version
        run: |
          npm version "${{ steps.increment.outputs.increment }}" --no-git-tag-version
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit release and tag
        run: |
          git add package.json package-lock.json
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push --atomic origin HEAD:main "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
